<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Saci Sabido - Fluência em Adição</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 40px;
            padding: 24px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.2s ease;
        }
        button:hover { background: #4f46e5; transform: scale(1.02); }
        .hidden { display: none; }
        .feedback {
            margin: 15px auto;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
        }
        .feedback-sucesso { background: #bbf7d0; color: #166534; }
        .feedback-erro { background: #fee2e2; color: #991b1b; }
        .numero-card {
            background: #f1f5f9;
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            font-family: monospace;
            min-width: 150px;
        }
        .operador-btn {
            font-size: 32px;
            font-weight: bold;
            background: #f8fafc;
            color: #1e293b;
            border: 2px solid #e2e8f0;
            padding: 20px 30px;
            border-radius: 60px;
            cursor: pointer;
        }
        .operador-btn:hover { background: #e0e7ff; border-color: #6366f1; transform: scale(1.05); }
        .numeros-container {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 8px; }
        .info-sesi {
            background: #fef9c3;
            border-radius: 20px;
            padding: 10px;
            margin-top: 10px;
            font-size: 12px;
            color: #854d0e;
        }
        .erro-acesso {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 40px;
            max-width: 500px;
            margin: 20px auto;
        }
        .erro-acesso h2 { color: #e53e3e; margin-bottom: 20px; }
        .erro-acesso button { background: #6366f1; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://qmcqffnawtfaenyziwsn.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtY3FmZm5hd3RmYWVueXppd3NuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNTM5NTMsImV4cCI6MjA4OTcyOTk1M30._CjaNoeJeQp-8s8Jt-dk3bJfktdEV97R5LhLnWgYrNc';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const jogoSlug = urlParams.get('jogo_slug');
    const alunoId = urlParams.get('aluno_id');
    const turmaId = urlParams.get('turma_id');
    const escolaId = urlParams.get('escola_id');
    const modoTeste = urlParams.get('modo_teste') === 'true';

    let pontuacao = 0, acertos = 0, erros = 0, jogoAtivo = false;
    let tempoInicio = null, tempoDecorrido = 0, intervalo = null;
    let detalhesErros = [];
    let numero1 = 0, numero2 = 0, respostaCorreta = 0;
    let perguntasRespondidas = 0;
    let jogoId = null;
    const TOTAL_PERGUNTAS = 10;

    function getMaxNumero() {
        if (acertos < 5) return 20;
        if (acertos < 10) return 50;
        return 100;
    }

    function gerarPergunta() {
        const maxNum = getMaxNumero();
        numero1 = Math.floor(Math.random() * (maxNum + 1));
        numero2 = Math.floor(Math.random() * (maxNum + 1));
        respostaCorreta = numero1 + numero2;
        
        document.getElementById('numeroEsquerda').textContent = numero1;
        document.getElementById('numeroDireita').textContent = numero2;
        document.getElementById('perguntaAtual').textContent = perguntasRespondidas + 1;
        document.getElementById('pontos').textContent = Math.floor(pontuacao);
    }

    function mostrarFeedback(mensagem, tipo) {
        const feedbackDiv = document.getElementById('feedbackJogo');
        feedbackDiv.textContent = mensagem;
        feedbackDiv.className = 'feedback';
        if (tipo === 'sucesso') feedbackDiv.classList.add('feedback-sucesso');
        else if (tipo === 'erro') feedbackDiv.classList.add('feedback-erro');
        setTimeout(() => {
            if (feedbackDiv.textContent === mensagem) {
                feedbackDiv.textContent = '';
                feedbackDiv.className = 'feedback';
            }
        }, 2000);
    }

    function iniciarCronometro() {
        if (intervalo) clearInterval(intervalo);
        intervalo = setInterval(() => {
            if (!jogoAtivo) return;
            tempoDecorrido = Math.floor((Date.now() - tempoInicio) / 1000);
        }, 1000);
    }

    function pararCronometro() { if (intervalo) clearInterval(intervalo); intervalo = null; }

    async function salvarResultado() {
        if (modoTeste || !alunoId) return;
        const dados = {
            aluno_id: alunoId, jogo_id: jogoId, turma_id: turmaId,
            acertos: acertos, erros: erros, tempo_segundos: tempoDecorrido,
            total_questoes: TOTAL_PERGUNTAS, habilidade_bncc: 'EF.02.MAT.1.33',
            detalhes_erros: detalhesErros.slice(0, 20)
        };
        await supabaseClient.from('resultados').insert([dados]);
    }

    async function finalizarJogo() {
        if (!jogoAtivo) return;
        jogoAtivo = false;
        pararCronometro();
        document.getElementById('finalPontos').textContent = Math.floor(pontuacao);
        document.getElementById('finalAcertos').textContent = acertos;
        document.getElementById('finalErros').textContent = erros;
        await salvarResultado();
        document.getElementById('telaJogo').classList.add('hidden');
        document.getElementById('telaFinal').classList.remove('hidden');
    }

    function verificarResposta() {
        if (!jogoAtivo) return;
        const inputResposta = document.getElementById('inputResposta');
        const respostaAluno = parseInt(inputResposta.value);
        
        if (isNaN(respostaAluno)) {
            mostrarFeedback('Digite um número!', 'erro');
            return;
        }
        
        if (respostaAluno === respostaCorreta) {
            pontuacao += 10;
            acertos++;
            mostrarFeedback(`✅ Correto! +10 pontos`, 'sucesso');
        } else {
            pontuacao = Math.max(0, pontuacao - 5);
            erros++;
            detalhesErros.push({ num1: numero1, num2: numero2, resposta: respostaAluno, correto: respostaCorreta });
            mostrarFeedback(`❌ Errado! A resposta correta era ${respostaCorreta}. -5 pontos`, 'erro');
        }
        
        perguntasRespondidas++;
        inputResposta.value = '';
        document.getElementById('pontos').textContent = Math.floor(pontuacao);
        
        if (perguntasRespondidas >= TOTAL_PERGUNTAS) {
            finalizarJogo();
        } else {
            gerarPergunta();
        }
    }

    function iniciarJogo() {
        pontuacao = 0; acertos = 0; erros = 0; perguntasRespondidas = 0;
        detalhesErros = []; jogoAtivo = true;
        tempoInicio = Date.now(); tempoDecorrido = 0;
        document.getElementById('pontos').textContent = "0";
        document.getElementById('perguntaAtual').textContent = "1";
        gerarPergunta();
        iniciarCronometro();
        document.getElementById('telaInicial').classList.add('hidden');
        document.getElementById('telaJogo').classList.remove('hidden');
        document.getElementById('telaFinal').classList.add('hidden');
        document.getElementById('inputResposta').focus();
    }

    async function verificarAcesso() {
        if (modoTeste) return true;
        if (!jogoSlug || !turmaId) {
            mostrarErro('❌ Link inválido. Faltam parâmetros.');
            return false;
        }
        try {
            const { data: jogo } = await supabaseClient.from('jogos').select('id').eq('slug', jogoSlug).single();
            if (!jogo) { mostrarErro('❌ Jogo não encontrado.'); return false; }
            jogoId = jogo.id;
            
            const { data: jogoTurma } = await supabaseClient.from('jogos_turma')
                .select('status, data_inicio, data_fim')
                .eq('turma_id', turmaId).eq('jogo_id', jogoId).single();
            
            if (!jogoTurma) { mostrarErro('❌ Este jogo não foi atribuído à sua turma.'); return false; }
            if (jogoTurma.status === 'inativo') { mostrarErro('❌ Este jogo está bloqueado pelo professor.'); return false; }
            
            const hoje = new Date().toISOString().split('T')[0];
            if (jogoTurma.status === 'agendado') {
                if (jogoTurma.data_inicio && hoje < jogoTurma.data_inicio) {
                    mostrarErro(`📅 Disponível a partir de ${jogoTurma.data_inicio}`);
                    return false;
                }
                if (jogoTurma.data_fim && hoje > jogoTurma.data_fim) {
                    mostrarErro(`⏰ Prazo encerrado em ${jogoTurma.data_fim}`);
                    return false;
                }
            }
            return true;
        } catch(e) { console.error(e); mostrarErro('Erro ao verificar acesso.'); return false; }
    }

    function mostrarErro(mensagem) {
        document.getElementById('app').innerHTML = `
            <div class="erro-acesso"><h2>⛔ Acesso Negado</h2><p>${mensagem}</p><button onclick="window.history.back()">Voltar</button></div>
        `;
    }

    async function carregarJogo() {
        const acesso = await verificarAcesso();
        if (!acesso && !modoTeste) return;
        
        document.getElementById('app').innerHTML = `
            <div class="container">
                <div id="telaInicial">
                    <h1>➕ Fluência em Adição</h1>
                    <p>Calcule o resultado da soma!</p>
                    <div class="info-sesi">📚 Habilidade: EF.02.MAT.1.33 - Resolver problemas de adição</div>
                    <div style="background:#f1f5f9; border-radius:20px; padding:12px; margin:20px 0; text-align:left;">
                        <strong>📋 Como jogar:</strong><br>• Você verá dois números.<br>• Digite o resultado da soma.<br>• Cada acerto vale 10 pontos.<br>• Cada erro desconta 5 pontos.<br>• Complete 10 perguntas!
                    </div>
                    <button id="btnIniciar">🚀 INICIAR JOGO</button>
                    <div class="mt-2" style="font-size:12px;">${modoTeste ? '🔧 Modo teste' : '✅ Conectado'}</div>
                </div>
                <div id="telaJogo" class="hidden">
                    <div style="display:flex; justify-content:space-between; background:#f8fafc; border-radius:30px; padding:12px; margin-bottom:25px; gap:15px; flex-wrap:wrap;">
                        <div style="background:white; border-radius:20px; padding:8px; flex:1;"><span style="font-size:12px;">PONTOS</span><div style="font-size:28px; font-weight:800;" id="pontos">0</div></div>
                        <div style="background:white; border-radius:20px; padding:8px; flex:1;"><span style="font-size:12px;">PERGUNTA</span><div style="font-size:28px; font-weight:800;" id="perguntaAtual">1</div></div>
                    </div>
                    <div class="numeros-container">
                        <div class="numero-card" id="numeroEsquerda">0</div>
                        <div style="font-size:48px; font-weight:bold;">+</div>
                        <div class="numero-card" id="numeroDireita">0</div>
                        <div style="font-size:48px; font-weight:bold;">=</div>
                        <input type="number" id="inputResposta" placeholder="?" style="font-size:32px; width:120px; text-align:center; border-radius:20px; border:2px solid #e2e8f0; padding:15px;">
                    </div>
                    <button id="btnVerificar" style="background:#22c55e;">✓ VERIFICAR</button>
                    <div id="feedbackJogo" class="feedback"></div>
                    <button id="btnSair">🚪 SAIR</button>
                </div>
                <div id="telaFinal" class="hidden">
                    <h1>🏆 Fim de jogo!</h1>
                    <div style="background:#eef2ff; padding:20px; border-radius:30px; margin:20px 0;">
                        <p><strong>Pontuação final:</strong> <span id="finalPontos">0</span></p>
                        <p><strong>Acertos:</strong> <span id="finalAcertos">0</span></p>
                        <p><strong>Erros:</strong> <span id="finalErros">0</span></p>
                    </div>
                    <button id="btnNovamente">🔄 JOGAR NOVAMENTE</button>
                </div>
            </div>
        `;
        
        document.getElementById('btnIniciar').onclick = iniciarJogo;
        document.getElementById('btnSair').onclick = () => {
            if (jogoAtivo && confirm("Deseja sair?")) finalizarJogo();
            else if (!jogoAtivo) { document.getElementById('telaJogo').classList.add('hidden'); document.getElementById('telaInicial').classList.remove('hidden'); }
        };
        document.getElementById('btnNovamente').onclick = () => {
            document.getElementById('telaFinal').classList.add('hidden');
            document.getElementById('telaInicial').classList.remove('hidden');
        };
        document.getElementById('btnVerificar').onclick = verificarResposta;
        document.getElementById('inputResposta').onkeypress = (e) => { if (e.key === 'Enter') verificarResposta(); };
    }
    
    carregarJogo();
</script>
</body>
</html>
